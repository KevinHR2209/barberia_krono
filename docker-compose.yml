version: '3.8'

services:
  db:
    image: postgres:15
    container_name: barberia_db
    environment:
      POSTGRES_USER: krono
      POSTGRES_PASSWORD: krono123
      POSTGRES_DB: barberia_krono
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U krono -d barberia_krono"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: barberia_backend
    environment:
      DATABASE_URL: postgresql://krono:krono123@db:5432/barberia_krono
      MAILTRAP_TOKEN: 6ff558f88cde51886affb361b6e6fe07
      FRONTEND_URL: http://localhost:5173
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    container_name: barberia_frontend
    environment:
      - VITE_API_URL=http://localhost:8000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - backend

volumes:
  postgres_data:
