version: '3.9'

services:
  db:
    image: postgres:15-alpine
    container_name: barberia_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-krono_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-krono_pass}
      POSTGRES_DB: ${POSTGRES_DB:-barberia_krono}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - barberia_net

  backend:
    build: ./backend
    container_name: barberia_backend
    restart: always
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://krono_user:krono_pass@db:5432/barberia_krono}
      SECRET_KEY: ${SECRET_KEY:-supersecretkey}
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
    networks:
      - barberia_net

  frontend:
    build: ./frontend
    container_name: barberia_frontend
    restart: always
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - barberia_net

volumes:
  postgres_data:

networks:
  barberia_net:
    driver: bridge
